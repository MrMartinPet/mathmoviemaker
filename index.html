<!doctype html><html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Math Movie Maker</title><style>:root{--bg:#07101e;--card:#111c2d;--line:#334155;--muted:#9fb0c5;--green:#22c55e}*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#07101e,#111827);color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1240px;margin:auto;padding:14px}.grid{display:grid;grid-template-columns:470px 1fr;gap:14px}.card{background:#111c2df5;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}h1{margin:2px 0}.sub,.small{color:var(--muted);font-size:13px;line-height:1.4}label{display:block;font-size:13px;font-weight:700;margin:9px 0 5px}input,select,button,textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:#1b2940;color:#fff;padding:9px;font-size:14px}textarea{min-height:130px}button{font-weight:750}.primary{background:var(--green);color:#052e16;border:0}.two{display:grid;grid-template-columns:1fr 1fr;gap:7px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}audio{width:100%;margin-top:7px}.timeline-shell{margin-top:8px;border:1px solid var(--line);border-radius:11px;background:#07101e;overflow-x:auto;touch-action:pan-x}.timeline{position:relative;height:178px;min-width:100%;user-select:none}.ruler{position:absolute;inset:0 0 auto 0;height:28px;border-bottom:1px solid var(--line)}.tick{position:absolute;top:0;height:28px;border-left:1px solid #334155;color:#9fb0c5;font-size:10px;padding-left:3px}.track{position:absolute;left:0;right:0;top:28px;bottom:0}.cue{position:absolute;height:38px;border-radius:7px;background:#1d4ed8;border:1px solid #60a5fa;overflow:hidden;cursor:grab;touch-action:none}.cue.sel{outline:3px solid var(--green);z-index:4}.cue span{position:absolute;inset:0 10px;display:flex;align-items:center;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}.handle{position:absolute;top:0;bottom:0;width:10px;background:#ffffff33;cursor:ew-resize}.handle.l{left:0}.handle.r{right:0}.playhead{position:absolute;top:0;bottom:0;width:2px;background:#facc15;z-index:5;pointer-events:none}.playhead:before{content:"";position:absolute;top:0;left:-5px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #facc15}.nudge{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:7px}.nudge button{padding:7px 3px;font-size:11px}.timing-list{display:grid;gap:7px;max-height:410px;overflow:auto;margin-top:9px}.row{border:1px solid var(--line);border-radius:10px;padding:7px;display:grid;grid-template-columns:1fr 78px 78px;gap:5px}.row select{grid-column:1/-1}.row.sel{outline:2px solid var(--green)}.preview{display:flex;align-items:center;justify-content:center;background:#020617;border-radius:13px;overflow:hidden;min-height:430px;position:sticky;top:10px}canvas{width:100%;height:auto}.status{background:#091322;border-radius:9px;padding:9px;min-height:39px;color:#cbd5e1;font-size:13px;margin-top:8px}.download{display:none;background:#2563eb;color:#fff;text-decoration:none;text-align:center;padding:11px;border-radius:9px;margin-top:8px;font-weight:750}@media(max-width:900px){.grid{grid-template-columns:1fr}.preview{position:static;min-height:240px}.three{grid-template-columns:1fr}.row{grid-template-columns:1fr 72px 72px}}</style></head><body><main><h1>Math Movie Maker</h1><p class="sub">Tidsätt text med dragbar tidslinje och välj språkneutrala animationer.</p><div class="grid"><section><div class="card"><label>Projektnamn</label><input id="projectName" value="Math Movie"><div class="three" style="margin-top:7px"><button id="saveLocal">Spara</button><button id="downloadProject">Ladda ner projekt</button><button id="openProject">Öppna projekt</button></div><input id="projectFile" type="file" accept=".json,application/json" hidden></div><div class="card"><label>1. Ljudfil</label><input id="audioFile" type="file" accept=".mp3,.wav,.m4a,.aac,audio/*"><audio id="audio" controls preload="metadata"></audio><label>2. Text – en rad per segment</label><textarea id="lyrics"></textarea><div class="two"><button id="makeRows">Skapa rader</button><button id="markTime" class="primary">Sätt nästa starttid</button></div><button id="resetTimes" style="margin-top:7px">Nollställ tider</button><div class="two"><button id="fitTimeline">Anpassa tidslinjen</button><select id="zoom"><option value="40">40 px/s</option><option value="70" selected>70 px/s</option><option value="110">110 px/s</option><option value="160">160 px/s</option></select></div><div id="shell" class="timeline-shell"><div id="timeline" class="timeline"><div id="ruler" class="ruler"></div><div id="track" class="track"></div><div id="playhead" class="playhead"></div></div></div><div class="nudge"><button data-n="-.1">← 0,1 s</button><button data-n=".1">0,1 s →</button><button data-e="start">Start = spelhuvud</button><button data-e="end">Slut = spelhuvud</button></div><p class="small">Dra blocket för att flytta raden. Dra kanterna för att ändra start eller slut. Tryck på tidslinjen för att flytta ljudet.</p><div id="timingList" class="timing-list"></div></div><div class="card"><div class="two"><select id="ratio"><option>16:9</option><option>9:16</option><option>1:1</option></select><select id="quality"><option value="720">720p</option><option value="1080">1080p</option></select></div><div class="two" style="margin-top:7px"><button id="previewBtn">Förhandsvisa</button><button id="stopBtn">Stoppa</button></div><button id="renderBtn" class="primary" style="margin-top:7px">Skapa video</button><div id="status" class="status">Välj ljudfil.</div><a id="download" class="download">Ladda ner video</a></div></section><section class="card"><div class="preview"><canvas id="canvas" width="1280" height="720"></canvas></div></section></div></main><script>"use strict";const $=x=>document.getElementById(x),audio=$("audio"),cv=$("canvas"),c=cv.getContext("2d"),base=[["none","Neutral"],["triangle","Triangel"],["sides","Rita tre sidor"],["corners","Tre hörn"],["angles","Tre vinklar"],["sum180","180°"],["perimeter","a + b + c"],["base","b"],["height","h"],["areaFill","Fyll area"],["area","A = (b × h) ÷ 2"],["pulse","Pulserande ringar"],["bars","Musikstaplar"],["question","Frågetecken"],["numbers","6–9"],["countdown","3–2–1"],["confetti","Konfetti"],["steps","Steg"]],mul=[];for(let a=6;a<10;a++)for(let b=6;b<10;b++){mul.push([`m-${a}-${b}-q`,`${a} × ${b} = ?`],[`m-${a}-${b}-a`,`${a} × ${b} = ${a*b}`])}const scenes=[...base,...mul];let cues=[],selected=-1,objUrl=null,raf=0,drag=null,aCtx=null,aSrc=null,aDest=null,stop=false,lastUrl=null;function status(s){$("status").textContent=s}function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}function save(){localStorage.setItem("mmm",JSON.stringify({name:$("projectName").value,lyrics:$("lyrics").value,cues,ratio:$("ratio").value,quality:$("quality").value}))}function apply(p){$("projectName").value=p.name||"Math Movie";$("lyrics").value=p.lyrics||"";cues=(p.cues||[]).map(x=>({...x}));$("ratio").value=p.ratio||"16:9";$("quality").value=p.quality||"720";rows();timeline();draw(0)}$("saveLocal").onclick=()=>{save();status("Projekt sparat.")};$("downloadProject").onclick=()=>{let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify({name:$("projectName").value,lyrics:$("lyrics").value,cues,ratio:$("ratio").value,quality:$("quality").value},null,2)],{type:"application/json"}));a.download="math-movie.json";a.click()};$("openProject").onclick=()=>$("projectFile").click();$("projectFile").onchange=async e=>{try{apply(JSON.parse(await e.target.files[0].text()));save()}catch(x){alert("Projektet kunde inte öppnas.")}};function guess(t){let x=t.toLowerCase(),m=x.match(/([6-9]).*?([6-9])/);if(m){let answer=/=|är|is|est|es/.test(x)&&!/\.\.\.|\?$/.test(x);return`m-${m[1]}-${m[2]}-${answer?"a":"q"}`}if(x.includes("180"))return"sum180";if(x.includes("omkrets")||x.includes("perimeter")||x.includes("périmètre")||x.includes("perímetro"))return"perimeter";if(x.includes("area")||x.includes("aire")||x.includes("área"))return"area";if(x.includes("höjd")||x.includes("height")||x.includes("hauteur")||x.includes("altura"))return"height";if(x.includes("bas")||x.includes("base"))return"base";if(x.includes("hörn")||x.includes("corner")||x.includes("sommet")||x.includes("vértice"))return"corners";if(x.includes("vinkel")||x.includes("angle")||x.includes("ángulo"))return"angles";if(x.includes("sida")||x.includes("side")||x.includes("côté")||x.includes("lado"))return"sides";return"pulse"}function rows(){let b=$("timingList");b.innerHTML="";cues.forEach((q,i)=>{let r=document.createElement("div");r.className="row"+(i===selected?" sel":"");r.innerHTML=`<input data-k="text" value="${esc(q.text)}"><input data-k="start" type="number" step=".01" value="${Number.isFinite(q.start)?q.start.toFixed(2):""}"><input data-k="end" type="number" step=".01" value="${Number.isFinite(q.end)?q.end.toFixed(2):""}"><select>${scenes.map(s=>`<option value="${s[0]}" ${s[0]===q.scene?"selected":""}>${s[1]}</option>`).join("")}</select>`;r.onclick=()=>{selected=i;rows();timeline()};r.querySelectorAll("input").forEach(x=>x.onchange=()=>{q[x.dataset.k]=x.dataset.k==="text"?x.value:(x.value===""?null:+x.value);save();timeline()});r.querySelector("select").onchange=e=>{q.scene=e.target.value;save()};b.appendChild(r)})}$("makeRows").onclick=()=>{let a=$("lyrics").value.split(/\r?\n/).map(x=>x.trim()).filter(Boolean),d=audio.duration||Math.max(30,a.length*3);cues=a.map((text,i)=>({text,start:i*d/a.length,end:(i+1)*d/a.length,scene:guess(text)}));selected=0;rows();timeline();save()};$("markTime").onclick=()=>{let i=cues.findIndex(x=>!Number.isFinite(x.start));if(i<0)return;let t=audio.currentTime;cues[i].start=t;if(i&& !Number.isFinite(cues[i-1].end))cues[i-1].end=t;if(i===cues.length-1)cues[i].end=audio.duration||t+2;selected=i;rows();timeline();save()};$("resetTimes").onclick=()=>{cues.forEach(x=>x.start=x.end=null);rows();timeline();save()};$("audioFile").onclick=e=>e.target.value="";$("audioFile").onchange=e=>{let f=e.target.files[0];if(!f)return;if(objUrl)URL.revokeObjectURL(objUrl);objUrl=URL.createObjectURL(f);audio.src=objUrl;audio.load();audio.onloadedmetadata=()=>{status(`Ljud laddat: ${f.name}`);timeline()};audio.onerror=()=>status("Ljudfilen kunde inte läsas.")};function dur(){return Math.max(audio.duration||0,...cues.map(x=>Number.isFinite(x.end)?x.end:0),20)}function timeline(){let p=+$('zoom').value,w=Math.max($("shell").clientWidth,dur()*p);$("timeline").style.width=w+"px";let r=$("ruler");r.innerHTML="";for(let s=0;s<=dur();s+=5){let t=document.createElement("div");t.className="tick";t.style.left=s*p+"px";t.textContent=s+"s";r.appendChild(t)}let tr=$("track");tr.innerHTML="";cues.forEach((q,i)=>{if(!Number.isFinite(q.start)||!Number.isFinite(q.end))return;let el=document.createElement("div");el.className="cue"+(i===selected?" sel":"");el.style.left=q.start*p+"px";el.style.width=Math.max(16,(q.end-q.start)*p)+"px";el.style.top=(6+(i%3)*45)+"px";el.innerHTML=`<i class="handle l"></i><span>${esc(q.text)}</span><i class="handle r"></i>`;el.onpointerdown=e=>{selected=i;let mode=e.target.classList.contains("l")?"l":e.target.classList.contains("r")?"r":"move";drag={mode,x:e.clientX,start:q.start,end:q.end};el.setPointerCapture(e.pointerId);rows();timeline()};el.onpointermove=e=>{if(!drag||selected!==i)return;let dx=(e.clientX-drag.x)/p;if(drag.mode==="move"){let len=drag.end-drag.start;q.start=Math.max(0,drag.start+dx);q.end=q.start+len}else if(drag.mode==="l")q.start=Math.max(0,Math.min(drag.end-.05,drag.start+dx));else q.end=Math.max(drag.start+.05,drag.end+dx);el.style.left=q.start*p+"px";el.style.width=Math.max(16,(q.end-q.start)*p)+"px"};el.onpointerup=()=>{drag=null;save();rows();timeline()};tr.appendChild(el)});head()}function head(){$("playhead").style.left=(audio.currentTime*(+$('zoom').value))+"px"}$("timeline").onclick=e=>{if(e.target.closest(".cue"))return;let x=e.clientX-$("timeline").getBoundingClientRect().left;audio.currentTime=Math.max(0,x/(+$('zoom').value));head();draw(audio.currentTime)};$("zoom").onchange=timeline;$("fitTimeline").onclick=()=>{$("zoom").value=Math.max(40,Math.min(160,$("shell").clientWidth/dur()));timeline()};document.querySelectorAll("[data-n]").forEach(b=>b.onclick=()=>{if(selected<0)return;let q=cues[selected],d=+b.dataset.n;q.start=Math.max(0,q.start+d);q.end=Math.max(q.start+.05,q.end+d);rows();timeline();save()});document.querySelectorAll("[data-e]").forEach(b=>b.onclick=()=>{if(selected<0)return;let q=cues[selected];if(b.dataset.e==="start")q.start=Math.min(audio.currentTime,(q.end||audio.currentTime+.1)-.05);else q.end=Math.max(audio.currentTime,(q.start||0)+.05);rows();timeline();save()});audio.ontimeupdate=head;function size(){let q=+$('quality').value,r=$('ratio').value;if(r==="16:9"){cv.height=q;cv.width=Math.round(q*16/9)}else if(r==="9:16"){cv.width=q;cv.height=Math.round(q*16/9)}else cv.width=cv.height=q}function line(a,b,d,e,col="#fff",w=10){c.strokeStyle=col;c.lineWidth=w;c.lineCap="round";c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke()}function center(t,y,s,col="#fff"){c.fillStyle=col;c.font=`900 ${s}px system-ui`;c.textAlign="center";c.fillText(t,cv.width/2,y)}function draw(t){let w=cv.width,h=cv.height,g=c.createLinearGradient(0,0,w,h);g.addColorStop(0,"#081229");g.addColorStop(1,"#172554");c.fillStyle=g;c.fillRect(0,0,w,h);let q=cues.find(x=>Number.isFinite(x.start)&&Number.isFinite(x.end)&&t>=x.start&&t<x.end),sc=q?.scene||"none",p=q?Math.max(0,Math.min(1,(t-q.start)/(q.end-q.start))):0,m=sc.match(/^m-(\d)-(\d)-(q|a)$/);if(m){let a=+m[1],b=+m[2],ans=m[3]==="a";center(ans?`${a} × ${b} = ${a*b}`:`${a} × ${b} = ?`,h*.48,w/(ans?12:11),ans?"#22c55e":"#facc15")}else if(sc.startsWith("triangle")||["sides","corners","angles","sum180","perimeter","base","height","areaFill","area"].includes(sc)){let A=[w*.5,h*.14],B=[w*.22,h*.68],D=[w*.78,h*.68];line(...A,...B,"#22c55e",w/100);line(...B,...D,"#38bdf8",w/100);line(...D,...A,"#f472b6",w/100);if(sc==="corners")for(let v of [A,B,D]){c.fillStyle="#facc15";c.beginPath();c.arc(v[0],v[1],w/45,0,7);c.fill()}if(sc==="sum180")center("180°",h*.48,w/10,"#facc15");if(sc==="perimeter")center("a + b + c",h*.8,w/24);if(sc==="base")center("b",h*.78,w/23,"#22c55e");if(sc==="height"||sc==="area"){c.setLineDash([15,10]);line(A[0],A[1],A[0],B[1],"#facc15",w/130);c.setLineDash([]);center("h",h*.45,w/24,"#facc15")}if(sc==="area")center("A = (b × h) ÷ 2",h*.82,w/28);if(sc==="areaFill"){c.fillStyle=`rgba(34,197,94,${.25+.55*p})`;c.beginPath();c.moveTo(...A);c.lineTo(...B);c.lineTo(...D);c.fill()}}else if(sc==="question")center("?",h*.5,w/6,"#facc15");else if(sc==="numbers")center("6   7   8   9",h*.5,w/12,"#38bdf8");else if(sc==="countdown")center(String(Math.max(1,3-Math.floor(p*3))),h*.5,w/6,"#facc15");else if(sc==="bars")for(let i=0;i<12;i++){let bh=h*(.08+.25*Math.abs(Math.sin(p*8+i)));c.fillStyle=i%2?"#38bdf8":"#22c55e";c.fillRect(w*(.2+i*.05),h*.58-bh,w*.025,bh)}else if(sc==="pulse")for(let i=0;i<4;i++){c.strokeStyle="#38bdf8";c.lineWidth=w/120;c.beginPath();c.arc(w/2,h*.43,w*(.07+i*.05+.03*Math.sin(p*6+i)),0,7);c.stroke()}else if(sc==="confetti")for(let i=0;i<50;i++){c.fillStyle=["#22c55e","#38bdf8","#f472b6","#facc15"][i%4];c.fillRect((i*97%100)/100*w,((i*53+p*150)%100)/100*h*.7,w/170,w/170)}if(q){c.font=`800 ${Math.max(28,w/29)}px system-ui`;c.textAlign="center";c.fillStyle="#020617dd";c.fillRect(0,h*.84,w,h*.16);c.fillStyle="#fff";c.fillText(q.text,w/2,h*.93)}}function valid(){return cues.length&&cues.every(x=>Number.isFinite(x.start)&&Number.isFinite(x.end)&&x.end>x.start)}$("previewBtn").onclick=()=>{if(!audio.src)return alert("Välj ljudfil.");if(!valid())return alert("Tidsätt alla rader.");size();audio.play();cancelAnimationFrame(raf);let loop=()=>{draw(audio.currentTime);head();if(!audio.paused&&!audio.ended)raf=requestAnimationFrame(loop)};loop()};$("stopBtn").onclick=()=>{stop=true;audio.pause();cancelAnimationFrame(raf)};function dest(){if(!aCtx){aCtx=new(window.AudioContext||window.webkitAudioContext);aSrc=aCtx.createMediaElementSource(audio);aDest=aCtx.createMediaStreamDestination();aSrc.connect(aDest);aSrc.connect(aCtx.destination)}return aDest}$("renderBtn").onclick=async()=>{if(!audio.src||!valid())return alert("Ladda ljud och tidsätt alla rader.");size();stop=false;audio.pause();audio.currentTime=0;try{let d=dest();if(aCtx.state==="suspended")await aCtx.resume();let type=["video/mp4;codecs=h264,aac","video/mp4","video/webm"].find(x=>MediaRecorder.isTypeSupported(x))||"",s=new MediaStream([...cv.captureStream(25).getVideoTracks(),...d.stream.getAudioTracks()]),r=new MediaRecorder(s,type?{mimeType:type}:undefined),chunks=[];r.ondataavailable=e=>e.data.size&&chunks.push(e.data);let done=new Promise((ok,no)=>{r.onstop=ok;r.onerror=no});r.start(1000);await audio.play();let loop=()=>{draw(audio.currentTime);status(`Skapar video… ${Math.round(audio.currentTime)} / ${Math.round(audio.duration)} s`);if(!stop&&!audio.ended)setTimeout(loop,40);else r.stop()};loop();await done;let blob=new Blob(chunks,{type:type||"video/webm"}),ext=type.includes("mp4")?"mp4":"webm";if(lastUrl)URL.revokeObjectURL(lastUrl);lastUrl=URL.createObjectURL(blob);let a=$("download");a.href=lastUrl;a.download=($("projectName").value||"math-movie")+"."+ext;a.textContent="Ladda ner "+ext.toUpperCase();a.style.display="block";status("Videon är klar.")}catch(e){status("Fel: "+e.message)}};try{let p=localStorage.getItem("mmm");if(p)apply(JSON.parse(p));else{draw(0);timeline()}}catch(e){draw(0);timeline()}</script></body></html>
