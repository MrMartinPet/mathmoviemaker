<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SRT Synkverktyg</title>
<style>
  :root{
    --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#f8fafc;
    --muted:#94a3b8; --accent:#22c55e; --danger:#ef4444; --line:#334155;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
  header{padding:18px 22px;border-bottom:1px solid var(--line);background:#0b1220;position:sticky;top:0;z-index:5}
  h1{margin:0;font-size:22px}
  .wrap{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px;min-height:calc(100vh - 67px)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  label{display:block;font-weight:700;margin:12px 0 6px}
  input[type=file], textarea, input[type=text], input[type=number]{
    width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:9px;padding:10px
  }
  textarea{min-height:280px;resize:vertical;line-height:1.45}
  button{
    border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer;
    background:#334155;color:#fff
  }
  button.primary{background:var(--accent);color:#06230f}
  button.danger{background:var(--danger)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  audio{width:100%;margin-top:12px}
  .hint{color:var(--muted);font-size:13px;line-height:1.4}
  .status{padding:10px;border:1px dashed var(--line);border-radius:9px;margin-top:12px;color:var(--muted)}
  .lyrics{display:flex;flex-direction:column;gap:8px}
  .line{
    display:grid;grid-template-columns:56px 1fr 120px 120px 92px;gap:8px;align-items:center;
    padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)
  }
  .line.active{outline:2px solid var(--accent);background:#17351f}
  .line.done{opacity:.82}
  .num{color:var(--muted);font-variant-numeric:tabular-nums}
  .txt{font-size:18px}
  .time{font-family:monospace;font-size:14px}
  .line button{padding:8px 10px}
  .kbd{font-family:monospace;background:#020617;border:1px solid var(--line);border-radius:5px;padding:2px 5px}
  @media(max-width:900px){
    .wrap{grid-template-columns:1fr}
    .line{grid-template-columns:44px 1fr}
    .time,.line button{grid-column:auto}
  }
</style>
</head>
<body>
<header><h1>SRT Synkverktyg</h1></header>

<div class="wrap">
  <section class="panel">
    <label>1. Välj ljudfil</label>
    <input id="audioFile" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg" />
    <audio id="audio" controls></audio>

    <label>2. Klistra in lyrics</label>
    <textarea id="lyricsInput" placeholder="En textrad per undertextsegment..."></textarea>

    <div class="row">
      <button id="buildBtn" class="primary">Skapa rader</button>
      <button id="clearBtn">Rensa allt</button>
    </div>

    <label>Standardlängd för sista raden</label>
    <input id="lastDuration" type="number" min="0.5" step="0.1" value="2.5" />

    <div class="row">
      <button id="playBtn">Spela / pausa</button>
      <button id="markBtn" class="primary">Markera nästa rad</button>
      <button id="undoBtn">Ångra senaste</button>
    </div>

    <div class="row">
      <button id="exportBtn" class="primary">Exportera SRT</button>
      <button id="copyBtn">Kopiera SRT</button>
    </div>

    <div class="status" id="status">
      Kortkommando: <span class="kbd">Mellanslag</span> = spela/pausa,
      <span class="kbd">Enter</span> = markera nästa rad,
      <span class="kbd">Backspace</span> = ångra.
    </div>

    <p class="hint">
      Varje tryck sätter starttiden för nästa textrad. Föregående rad slutar automatiskt vid nästa tryck.
      Du kan finjustera tiderna direkt i listan.
    </p>
  </section>

  <section class="panel">
    <div id="lyricsList" class="lyrics"></div>
  </section>
</div>

<script>
const audioFile = document.getElementById('audioFile');
const audio = document.getElementById('audio');
const lyricsInput = document.getElementById('lyricsInput');
const lyricsList = document.getElementById('lyricsList');
const buildBtn = document.getElementById('buildBtn');
const clearBtn = document.getElementById('clearBtn');
const playBtn = document.getElementById('playBtn');
const markBtn = document.getElementById('markBtn');
const undoBtn = document.getElementById('undoBtn');
const exportBtn = document.getElementById('exportBtn');
const copyBtn = document.getElementById('copyBtn');
const lastDuration = document.getElementById('lastDuration');
const status = document.getElementById('status');

let rows = [];
let nextIndex = 0;
let history = [];

audioFile.addEventListener('change', () => {
  const file = audioFile.files[0];
  if (!file) return;
  audio.src = URL.createObjectURL(file);
  status.textContent = `Ljudfil laddad: ${file.name}`;
});

buildBtn.addEventListener('click', buildRows);
clearBtn.addEventListener('click', () => {
  rows = []; nextIndex = 0; history = [];
  lyricsList.innerHTML = '';
  lyricsInput.value = '';
  audio.removeAttribute('src');
  audio.load();
  audioFile.value = '';
  status.textContent = 'Allt är rensat.';
});

playBtn.addEventListener('click', togglePlay);
markBtn.addEventListener('click', markNext);
undoBtn.addEventListener('click', undoLast);
exportBtn.addEventListener('click', exportSrt);
copyBtn.addEventListener('click', copySrt);

function buildRows(){
  const lines = lyricsInput.value
    .split(/\r?\n/)
    .map(x => x.trim())
    .filter(Boolean);

  rows = lines.map(text => ({text, start:null, end:null}));
  nextIndex = 0;
  history = [];
  renderRows();
  status.textContent = `${rows.length} textrader skapade. Starta ljudet och markera rad för rad.`;
}

function togglePlay(){
  if (!audio.src) return;
  audio.paused ? audio.play() : audio.pause();
}

function markNext(){
  if (!rows.length || nextIndex >= rows.length || !audio.src) return;

  const t = audio.currentTime;
  history.push(JSON.stringify(rows));

  rows[nextIndex].start = t;
  if (nextIndex > 0) rows[nextIndex - 1].end = t;

  nextIndex++;
  if (nextIndex === rows.length){
    rows[rows.length - 1].end = Math.min(
      audio.duration || Infinity,
      t + parseFloat(lastDuration.value || 2.5)
    );
    status.textContent = 'Alla rader markerade. Finjustera vid behov och exportera SRT.';
  } else {
    status.textContent = `Markerat ${nextIndex}/${rows.length}. Nästa: ${rows[nextIndex].text}`;
  }
  renderRows();
}

function undoLast(){
  if (!history.length) return;
  rows = JSON.parse(history.pop());
  nextIndex = rows.filter(r => r.start !== null).length;
  status.textContent = `Ångrade senaste markeringen. Nästa rad: ${nextIndex + 1}`;
  renderRows();
}

function renderRows(){
  lyricsList.innerHTML = '';
  rows.forEach((r,i) => {
    const el = document.createElement('div');
    el.className = 'line' + (i === nextIndex ? ' active' : '') + (r.start !== null ? ' done' : '');

    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = i + 1;

    const txt = document.createElement('div');
    txt.className = 'txt';
    txt.textContent = r.text;

    const start = document.createElement('input');
    start.className = 'time';
    start.value = r.start === null ? '' : formatTimeInput(r.start);
    start.placeholder = '00:00:00.000';
    start.addEventListener('change', () => {
      const v = parseTimeInput(start.value);
      if (v !== null) {
        r.start = v;
        if (i > 0 && rows[i-1].end === null) rows[i-1].end = v;
      }
      renderRows();
    });

    const end = document.createElement('input');
    end.className = 'time';
    end.value = r.end === null ? '' : formatTimeInput(r.end);
    end.placeholder = '00:00:00.000';
    end.addEventListener('change', () => {
      const v = parseTimeInput(end.value);
      if (v !== null) r.end = v;
      renderRows();
    });

    const jump = document.createElement('button');
    jump.textContent = 'Hoppa';
    jump.addEventListener('click', () => {
      if (r.start !== null) {
        audio.currentTime = r.start;
        audio.play();
      }
    });

    el.append(num, txt, start, end, jump);
    lyricsList.appendChild(el);
  });
}

function buildSrt(){
  const valid = rows.filter(r => r.start !== null);
  return valid.map((r,i) => {
    let end = r.end;
    if (end === null) {
      end = i < valid.length - 1
        ? valid[i+1].start
        : r.start + parseFloat(lastDuration.value || 2.5);
    }
    return `${i+1}\n${toSrtTime(r.start)} --> ${toSrtTime(end)}\n${r.text}`;
  }).join('\n\n');
}

function exportSrt(){
  const srt = buildSrt();
  if (!srt) return;
  const blob = new Blob([srt], {type:'application/x-subrip;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'synkroniserad_text.srt';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function copySrt(){
  const srt = buildSrt();
  if (!srt) return;
  await navigator.clipboard.writeText(srt);
  status.textContent = 'SRT kopierad till urklipp.';
}

function toSrtTime(sec){
  const ms = Math.max(0, Math.round(sec * 1000));
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const milli = ms % 1000;
  return `${pad(h)}:${pad(m)}:${pad(s)},${String(milli).padStart(3,'0')}`;
}

function formatTimeInput(sec){
  return toSrtTime(sec).replace(',', '.');
}

function parseTimeInput(value){
  const m = value.trim().match(/^(\d{1,2}):(\d{2}):(\d{2})[.,](\d{1,3})$/);
  if (!m) return null;
  return Number(m[1])*3600 + Number(m[2])*60 + Number(m[3]) + Number(m[4].padEnd(3,'0'))/1000;
}

function pad(n){ return String(n).padStart(2,'0'); }

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const editing = tag === 'INPUT' || tag === 'TEXTAREA';

  if (e.code === 'Space' && !editing){
    e.preventDefault();
    togglePlay();
  }
  if (e.key === 'Enter' && !editing){
    e.preventDefault();
    markNext();
  }
  if (e.key === 'Backspace' && !editing){
    e.preventDefault();
    undoLast();
  }
});
</script>
</body>
</html>
