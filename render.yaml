services:
  - type: web
    name: lyrics-sync
    runtime: python
    plan: free
    rootDir: render_app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WHISPER_MODEL
        value: tiny
